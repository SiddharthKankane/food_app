name: food_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  geolocator: ^14.0.3
  geocoding: ^4.0.0
  provider: ^6.1.2
  lottie: ^3.4.0
  sqflite: ^2.4.3
  path: ^1.9.1
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - images/
    - animations/

  fonts:
    - family: TimesNewRoman
      fonts:
        - asset: fonts/times.ttf
          weight: 700
